<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Sigil — Intent Graph Viewer</title>
  <link rel="icon" type="image/x-icon" href="../../branding/favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="../../branding/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="../../branding/favicon-16x16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="../../branding/apple-touch-icon.png" />
  <meta property="og:image" content="../../branding/social-card.png" />
  <meta property="og:title" content="Sigil — Intent-first engineering" />
  <meta property="og:description" content="Version control for architectural decisions. Specs, ADRs, gates, and components as a connected graph." />
  <meta name="twitter:card" content="summary_large_image" />
  <style>
    :root {
      --base00: #1a1c22; --base01: #282b31; --base02: #3a3d42; --base03: #5a5d62;
      --base04: #828079; --base05: #dbd6cc; --base06: #eeeae2; --base07: #f8f6f2;
      --base08: #e7349c; --base09: #f26c33; --base0A: #f2a633; --base0B: #04b372;
      --base0C: #1ad0d6; --base0D: #458ae2; --base0E: #9871fe; --base0F: #bbff00;
      --base10: #c8518f; --base11: #d68c6f; --base12: #dfb683; --base13: #61b186;
      --base14: #91cbcd; --base15: #5e84b6; --base16: #8f72e3; --base17: #d2fc91;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'SF Mono', 'Fira Code', 'JetBrains Mono', monospace;
      background: var(--base00); color: var(--base05);
      display: flex; flex-direction: column; height: 100vh; overflow: hidden;
    }

    /* Top bar */
    #topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 16px; background: var(--base00);
      border-bottom: 1px solid var(--base02); flex-shrink: 0;
    }
    #topbar-left { display: flex; align-items: center; gap: 12px; }
    #topbar h1 {
      font-size: 14px; font-weight: 700; color: var(--base0F);
      letter-spacing: 2px; text-transform: uppercase;
    }
    .view-btn {
      padding: 4px 10px; font-size: 11px; font-weight: 600;
      color: var(--base04); background: transparent;
      border: 1px solid var(--base02); border-radius: 4px;
      cursor: pointer; font-family: inherit;
      transition: all 0.15s;
    }
    .view-btn:hover { color: var(--base05); border-color: var(--base03); }
    .view-btn.active { color: var(--base0F); border-color: var(--base0F); background: rgba(187,255,0,0.08); }

    /* Health badge */
    #health-badge {
      display: flex; align-items: center; gap: 8px;
      padding: 4px 12px; border-radius: 999px;
      font-size: 12px; font-weight: 700;
    }
    .health-excellent { background: rgba(4,179,114,0.15); color: var(--base0B); }
    .health-good { background: rgba(69,138,226,0.15); color: var(--base0D); }
    .health-fair { background: rgba(242,166,51,0.15); color: var(--base0A); }
    .health-poor { background: rgba(231,52,156,0.15); color: var(--base08); }

    /* Main layout */
    #main { display: flex; flex: 1; overflow: hidden; }

    /* Graph panel */
    #left {
      width: 55%; border-right: 1px solid var(--base02);
      position: relative; background: var(--base00);
    }
    #svg { width: 100%; height: 100%; }
    #radar-svg { width: 100%; height: 100%; display: none; }
    #hierarchy-svg { width: 100%; height: 100%; display: none; }

    /* Detail panel */
    #right {
      width: 45%; display: flex; flex-direction: column;
      background: var(--base01); overflow: hidden;
    }
    #search-bar {
      padding: 10px 14px; border-bottom: 1px solid var(--base02);
      background: var(--base00);
    }
    #search {
      width: 100%; padding: 8px 12px;
      background: var(--base01); color: var(--base05);
      border: 1px solid var(--base02); border-radius: 6px;
      font-family: inherit; font-size: 13px; outline: none;
    }
    #search:focus { border-color: var(--base0D); }
    #search::placeholder { color: var(--base03); }

    /* Breadcrumb */
    #breadcrumb {
      padding: 8px 14px; font-size: 12px; color: var(--base04);
      border-bottom: 1px solid var(--base02); background: var(--base00);
      white-space: nowrap; overflow-x: auto;
    }
    #breadcrumb span { cursor: pointer; }
    #breadcrumb span:hover { color: var(--base0D); }
    #breadcrumb .sep { color: var(--base03); margin: 0 6px; cursor: default; }

    /* Node header */
    #node-header {
      padding: 14px; border-bottom: 1px solid var(--base02);
      background: var(--base01);
    }
    #node-header h2 {
      font-size: 16px; font-weight: 600; color: var(--base06);
      margin-bottom: 6px;
    }
    .pill {
      display: inline-block; padding: 2px 8px;
      border-radius: 999px; font-size: 11px; font-weight: 600;
      margin-right: 6px;
    }
    .pill-type { background: var(--base02); color: var(--base05); }
    .pill-id { background: transparent; border: 1px solid var(--base03); color: var(--base04); }
    .pill-status { color: var(--base00); font-weight: 700; }
    .pill-status[data-status="accepted"] { background: var(--base0B); }
    .pill-status[data-status="draft"] { background: var(--base0A); }
    .pill-status[data-status="proposed"] { background: var(--base0E); }
    .pill-status[data-status="rejected"] { background: var(--base08); }
    .pill-status[data-status="superseded"] { background: var(--base03); }
    .pill-status[data-status="active"] { background: var(--base0B); }

    /* Tabs */
    #tabs {
      display: flex; border-bottom: 1px solid var(--base02);
      background: var(--base01);
    }
    .tab {
      padding: 8px 16px; font-size: 12px; font-weight: 600;
      color: var(--base04); cursor: pointer; border-bottom: 2px solid transparent;
      transition: color 0.15s, border-color 0.15s;
    }
    .tab:hover { color: var(--base05); }
    .tab.active { color: var(--base0D); border-bottom-color: var(--base0D); }

    /* Content area */
    #content-area {
      flex: 1; overflow-y: auto; padding: 16px 20px;
    }

    /* Markdown styles -- human++ */
    .md-body h1 { font-size: 20px; color: var(--base07); margin: 20px 0 10px; font-weight: 700; }
    .md-body h1:first-child { margin-top: 0; }
    .md-body h2 { font-size: 16px; color: var(--base06); margin: 18px 0 8px; font-weight: 600; border-bottom: 1px solid var(--base02); padding-bottom: 4px; }
    .md-body h3 { font-size: 14px; color: var(--base14); margin: 14px 0 6px; font-weight: 600; }
    .md-body h4 { font-size: 13px; color: var(--base04); margin: 12px 0 4px; font-weight: 600; }
    .md-body p { margin: 8px 0; line-height: 1.6; }
    .md-body a { color: var(--base0D); text-decoration: none; }
    .md-body a:hover { text-decoration: underline; }
    .md-body strong { color: var(--base06); font-weight: 600; }
    .md-body em { color: var(--base03); font-style: italic; }
    .md-body code {
      background: var(--base02); color: var(--base12);
      padding: 2px 5px; border-radius: 3px; font-size: 12px;
    }
    .md-body pre {
      background: var(--base00); border: 1px solid var(--base02);
      padding: 12px; border-radius: 6px; overflow-x: auto;
      margin: 10px 0; font-size: 12px; line-height: 1.5;
    }
    .md-body pre code { background: none; padding: 0; color: var(--base05); }
    .md-body ul, .md-body ol { margin: 8px 0; padding-left: 22px; }
    .md-body li { margin: 4px 0; line-height: 1.5; }
    .md-body li code { font-size: 11px; }
    .md-body blockquote {
      border-left: 3px solid var(--base0E);
      padding: 4px 12px; margin: 10px 0;
      color: var(--base04); background: var(--base00);
      border-radius: 0 4px 4px 0;
    }
    .md-body hr { border: none; border-top: 1px solid var(--base02); margin: 16px 0; }
    .md-body table { border-collapse: collapse; width: 100%; margin: 10px 0; font-size: 13px; }
    .md-body th { background: var(--base02); color: var(--base06); text-align: left; padding: 6px 10px; font-weight: 600; }
    .md-body td { border-top: 1px solid var(--base02); padding: 6px 10px; }
    .md-body input[type="checkbox"] { margin-right: 6px; accent-color: var(--base0B); }

    /* Human++ annotation markers */
    .marker-attention {
      background: var(--base0F); color: var(--base00);
      padding: 2px 6px; border-radius: 4px; font-weight: bold; font-style: normal;
    }
    .marker-uncertainty {
      background: var(--base0E); color: var(--base07);
      padding: 2px 6px; border-radius: 4px; font-weight: bold; font-style: normal;
    }
    .marker-reference {
      background: var(--base0C); color: var(--base00);
      padding: 2px 6px; border-radius: 4px; font-weight: bold; font-style: normal;
    }

    /* Wikilinks */
    .wikilink {
      color: var(--base0D); cursor: pointer; text-decoration: none;
      border-bottom: 1px dashed var(--base0D);
    }
    .wikilink:hover { color: var(--base0C); border-color: var(--base0C); }

    /* Graph tab */
    .edge-list { list-style: none; padding: 0; }
    .edge-list li {
      padding: 6px 0; border-bottom: 1px solid var(--base02);
      font-size: 13px; display: flex; align-items: center; gap: 8px;
    }
    .edge-list li:last-child { border-bottom: none; }
    .edge-type {
      font-size: 11px; color: var(--base0E); background: var(--base02);
      padding: 2px 6px; border-radius: 3px; font-weight: 600;
    }
    .edge-target { color: var(--base0D); cursor: pointer; }
    .edge-target:hover { text-decoration: underline; }
    .edge-dir { color: var(--base03); font-size: 12px; }

    /* Edge labels on graph */
    .edge-label {
      font-size: 9px; fill: var(--base03);
      pointer-events: none; opacity: 0;
      transition: opacity 0.2s;
    }
    .edge-label.visible { opacity: 1; }

    /* Node glow for high-connectivity */
    .node-glow {
      filter: url(#glow);
    }

    /* Loading state */
    .loading { color: var(--base03); font-style: italic; padding: 20px; }

    /* Legend */
    #legend {
      position: absolute; bottom: 12px; left: 12px;
      background: var(--base01); border: 1px solid var(--base02);
      border-radius: 6px; padding: 8px 12px; font-size: 11px;
    }
    .legend-item { display: flex; align-items: center; gap: 6px; margin: 3px 0; }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; }

    /* Coverage dashboard */
    .cov-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
      margin-bottom: 20px;
    }
    .cov-card {
      background: var(--base00); border: 1px solid var(--base02);
      border-radius: 8px; padding: 14px;
    }
    .cov-card-title { font-size: 11px; color: var(--base04); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
    .cov-card-value { font-size: 28px; font-weight: 700; }
    .cov-card-sub { font-size: 12px; color: var(--base03); margin-top: 4px; }

    .cov-bar-track {
      width: 100%; height: 8px; background: var(--base02);
      border-radius: 4px; margin-top: 8px; overflow: hidden;
    }
    .cov-bar-fill {
      height: 100%; border-radius: 4px;
      transition: width 0.5s ease;
    }

    .cov-finding {
      display: flex; align-items: flex-start; gap: 8px;
      padding: 8px 0; border-bottom: 1px solid var(--base02);
      font-size: 13px;
    }
    .cov-finding:last-child { border-bottom: none; }
    .cov-sev {
      font-size: 10px; font-weight: 700; padding: 2px 6px;
      border-radius: 3px; flex-shrink: 0;
    }
    .cov-sev-warn { background: var(--base0A); color: var(--base00); }
    .cov-sev-info { background: var(--base0C); color: var(--base00); }
    .cov-sev-ok { background: var(--base0B); color: var(--base00); }
    .cov-finding-text { color: var(--base05); }
    .cov-finding-text .cov-link { color: var(--base0D); cursor: pointer; }
    .cov-finding-text .cov-link:hover { text-decoration: underline; }

    /* Radar view */
    .radar-ring-label {
      font-size: 10px; fill: var(--base03);
      text-anchor: middle; dominant-baseline: middle;
    }
    .radar-node { cursor: pointer; }
    .radar-node text {
      font-size: 9px; fill: var(--base04);
      text-anchor: middle; dominant-baseline: hanging;
    }
    .radar-center-label {
      font-size: 13px; fill: var(--base07); font-weight: 700;
      text-anchor: middle; dominant-baseline: central;
    }
    .radar-edge { stroke: var(--base02); stroke-width: 1; }

    /* Node tooltip */
    #tooltip {
      position: absolute; pointer-events: none;
      background: var(--base01); border: 1px solid var(--base02);
      border-radius: 8px; padding: 10px 14px;
      max-width: 320px; font-size: 12px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.4);
      opacity: 0; transition: opacity 0.15s;
      z-index: 100;
    }
    #tooltip.show { opacity: 1; }
    #tooltip .tt-id { color: var(--base0D); font-weight: 600; }
    #tooltip .tt-type { color: var(--base04); font-size: 11px; margin-left: 6px; }
    #tooltip .tt-title { color: var(--base06); margin: 4px 0; font-weight: 500; }
    #tooltip .tt-summary { color: var(--base04); font-size: 11px; line-height: 1.4; margin-top: 4px; }
    #tooltip .tt-status {
      display: inline-block; font-size: 10px; font-weight: 700;
      padding: 1px 6px; border-radius: 3px; margin-left: 6px;
    }

    /* Keyboard hint */
    #keyhint {
      position: absolute; bottom: 12px; right: 12px;
      background: var(--base01); border: 1px solid var(--base02);
      border-radius: 6px; padding: 6px 10px; font-size: 10px;
      color: var(--base03);
    }
    .keyhint-key {
      display: inline-block; background: var(--base02); color: var(--base04);
      padding: 1px 5px; border-radius: 3px; font-weight: 600;
      margin: 0 2px;
    }

    /* New doc modal */
    #new-btn {
      padding: 4px 10px; font-size: 11px; font-weight: 600;
      color: var(--base0B); background: rgba(4,179,114,0.1);
      border: 1px solid var(--base0B); border-radius: 4px;
      cursor: pointer; font-family: inherit;
      transition: all 0.15s; margin-left: 4px;
    }
    #new-btn:hover { background: rgba(4,179,114,0.2); }
    #modal-overlay {
      display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.6); z-index: 500;
      align-items: center; justify-content: center;
    }
    #modal-overlay.show { display: flex; }
    #modal {
      background: var(--base01); border: 1px solid var(--base02);
      border-radius: 10px; padding: 24px; width: 400px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }
    #modal h3 { color: var(--base06); font-size: 16px; margin-bottom: 16px; }
    .modal-field { margin-bottom: 12px; }
    .modal-field label {
      display: block; font-size: 11px; font-weight: 600;
      color: var(--base04); text-transform: uppercase;
      letter-spacing: 0.5px; margin-bottom: 4px;
    }
    .modal-field input, .modal-field select {
      width: 100%; padding: 8px 12px;
      background: var(--base00); color: var(--base05);
      border: 1px solid var(--base02); border-radius: 6px;
      font-family: inherit; font-size: 13px; outline: none;
    }
    .modal-field input:focus, .modal-field select:focus { border-color: var(--base0D); }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
    .modal-actions button {
      padding: 6px 16px; border-radius: 6px; font-family: inherit;
      font-size: 12px; font-weight: 600; cursor: pointer; border: none;
    }
    .modal-cancel { background: var(--base02); color: var(--base05); }
    .modal-cancel:hover { background: var(--base03); }
    .modal-create { background: var(--base0B); color: var(--base00); }
    .modal-create:hover { opacity: 0.9; }
    .modal-error { color: var(--base08); font-size: 12px; margin-top: 8px; }
    .modal-success { color: var(--base0B); font-size: 12px; margin-top: 8px; }

    /* Timeline view */
    #timeline-container {
      width: 100%; height: 100%; display: none; overflow: auto;
      background: var(--base00); padding: 20px;
    }
    .tl-header {
      font-size: 14px; font-weight: 700; color: var(--base06);
      margin-bottom: 16px;
    }
    .tl-header span { color: var(--base03); font-weight: 400; font-size: 12px; margin-left: 8px; }
    .tl-swimlane {
      position: relative; margin-bottom: 2px;
      border-bottom: 1px solid var(--base02);
      min-height: 36px; display: flex; align-items: center;
    }
    .tl-lane-label {
      width: 100px; flex-shrink: 0; font-size: 11px; font-weight: 600;
      color: var(--base04); text-transform: uppercase; letter-spacing: 0.5px;
      padding: 0 8px;
    }
    .tl-lane-track {
      flex: 1; position: relative; height: 36px; overflow: visible;
    }
    .tl-event {
      position: absolute; top: 6px;
      width: 24px; height: 24px; border-radius: 50%;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      font-size: 9px; font-weight: 700; color: var(--base00);
      transition: transform 0.15s, box-shadow 0.15s;
      z-index: 1;
    }
    .tl-event:hover {
      transform: scale(1.4); z-index: 10;
      box-shadow: 0 0 12px rgba(187,255,0,0.3);
    }
    .tl-event[data-action="added"] { }
    .tl-event[data-action="modified"] { opacity: 0.7; }
    .tl-event[data-action="removed"] { opacity: 0.5; border: 2px solid var(--base08); }
    .tl-axis {
      display: flex; align-items: center; padding: 8px 0 4px 100px;
      border-top: 1px solid var(--base02); margin-top: 8px;
    }
    .tl-axis-label {
      position: absolute; font-size: 10px; color: var(--base03);
      transform: translateX(-50%); white-space: nowrap;
    }
    .tl-event-tooltip {
      position: fixed; pointer-events: none;
      background: var(--base01); border: 1px solid var(--base02);
      border-radius: 6px; padding: 8px 12px; font-size: 12px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.4);
      opacity: 0; transition: opacity 0.15s; z-index: 200;
      max-width: 300px;
    }
    .tl-event-tooltip.show { opacity: 1; }
    .tl-empty {
      color: var(--base03); font-size: 13px; padding: 20px;
      text-align: center;
    }

    /* Matrix view */
    #matrix-container {
      width: 100%; height: 100%; display: none; overflow: auto;
      background: var(--base00); padding: 16px;
    }
    .matrix-table { border-collapse: collapse; font-size: 10px; }
    .matrix-table th {
      padding: 2px 4px; font-weight: 600; color: var(--base04);
      max-width: 80px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .matrix-table th.row-header { text-align: right; padding-right: 8px; }
    .matrix-table th.col-header {
      writing-mode: vertical-rl; text-orientation: mixed;
      transform: rotate(180deg); height: 80px; vertical-align: bottom; padding-bottom: 6px;
    }
    .matrix-cell {
      width: 24px; height: 24px; cursor: pointer;
      border: 1px solid var(--base01); transition: transform 0.1s;
    }
    .matrix-cell:hover { transform: scale(1.3); z-index: 10; position: relative; }
    .matrix-diag { background: var(--base02); }

    /* Command palette */
    #cmd-overlay {
      display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5); z-index: 600;
      justify-content: center; padding-top: 15vh;
    }
    #cmd-overlay.show { display: flex; }
    #cmd-palette {
      background: var(--base01); border: 1px solid var(--base02);
      border-radius: 10px; width: 480px; max-height: 400px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5); overflow: hidden;
      align-self: flex-start;
    }
    #cmd-input {
      width: 100%; padding: 14px 16px;
      background: var(--base00); color: var(--base05);
      border: none; border-bottom: 1px solid var(--base02);
      font-family: inherit; font-size: 14px; outline: none;
    }
    #cmd-input::placeholder { color: var(--base03); }
    #cmd-results {
      max-height: 300px; overflow-y: auto; padding: 4px;
    }
    .cmd-item {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 12px; border-radius: 6px; cursor: pointer;
      font-size: 13px; color: var(--base05);
    }
    .cmd-item:hover, .cmd-item.selected { background: var(--base02); }
    .cmd-item-icon {
      width: 20px; height: 20px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 700; color: var(--base00); flex-shrink: 0;
    }
    .cmd-item-text { flex: 1; }
    .cmd-item-hint { font-size: 11px; color: var(--base03); }
    .cmd-item-type { font-size: 10px; color: var(--base04); }

    /* View badges */
    .view-badge {
      font-size: 9px; background: var(--base02); color: var(--base04);
      padding: 1px 5px; border-radius: 8px; margin-left: 4px;
    }

    /* Scrollbar */
    #content-area::-webkit-scrollbar { width: 6px; }
    #content-area::-webkit-scrollbar-track { background: var(--base01); }
    #content-area::-webkit-scrollbar-thumb { background: var(--base02); border-radius: 3px; }
    #content-area::-webkit-scrollbar-thumb:hover { background: var(--base03); }
  </style>
</head>
<body>
  <div id="topbar">
    <div id="topbar-left">
      <h1>Sigil</h1>
      <button class="view-btn active" data-view="graph" onclick="switchView('graph')">Graph</button>
      <button class="view-btn" data-view="radar" onclick="switchView('radar')">Impact Radar</button>
      <button class="view-btn" data-view="hierarchy" onclick="switchView('hierarchy')">Hierarchy</button>
      <button class="view-btn" data-view="coverage" onclick="switchView('coverage')">Coverage</button>
      <button class="view-btn" data-view="drift" onclick="switchView('drift')">Drift</button>

  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    let graphData = null;
    let selectedNode = null;
    let activeTab = "content";
    let activeView = "graph";
    let allNodes = [];
    let sim = null;

    const nodeColors = {
      component: "#828079",
      spec:      "#04b372",
      interface: "#458ae2",
      gate:      "#e7349c",
      adr:       "#9871fe",
      risk:      "#f26c33",
      rollout:   "#1ad0d6"
    };

    const edgeColors = {
      belongs_to: "var(--base03)",
      decided_by: "var(--base16)",
      depends_on: "var(--base09)",
      gated_by: "var(--base10)",
      provides: "var(--base13)",
      consumes: "var(--base14)",
      relates_to: "var(--base02)",
      supersedes: "var(--base08)"
    };

    // ---- Utilities ----

    function esc(s) {
      return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    async function loadGraph() {
      const res = await fetch("../../.intent/index/graph.json");
      if (!res.ok) throw new Error("Failed to load graph.json -- run: python tools/intent/sigil.py index");
      return await res.json();
    }

    // ---- Coverage Engine ----

    function computeCoverage(graph) {
      const nodes = graph.nodes;
      const edges = graph.edges;
      const components = nodes.filter(n => n.type === "component");
      const specs = nodes.filter(n => n.type === "spec");
      const adrs = nodes.filter(n => n.type === "adr");
      const gates = nodes.filter(n => n.type === "gate");
      const findings = [];

      // Components with no governing spec
      const compsWithSpec = new Set();
      edges.filter(e => e.type === "belongs_to").forEach(e => {
        compsWithSpec.add(e.dst);
      });
      const uncomps = components.filter(c => !compsWithSpec.has(c.id));
      if (uncomps.length) {
        findings.push({
          sev: "warn",
          text: `${uncomps.length} component(s) have no governing spec`,
          nodes: uncomps
        });
      }

      // Specs with no acceptance criteria
      const specsNoAC = specs.filter(s => {
        const fm = s.frontmatter || {};
        const summary = s.body_summary || "";
        return !summary.includes("Acceptance Criteria") && !summary.includes("acceptance criteria");
      });
      // Actually check the file content if we have frontmatter
      // For now use body_summary as a heuristic
      if (specsNoAC.length && specsNoAC.length < specs.length) {
        findings.push({
          sev: "info",
          text: `${specsNoAC.length} spec(s) may be missing acceptance criteria`,
          nodes: specsNoAC
        });
      }

      // ADRs still in draft
      const draftADRs = adrs.filter(a => {
        const fm = a.frontmatter || {};
        return fm.status === "draft" || fm.status === "proposed";
      });
      if (draftADRs.length) {
        findings.push({
          sev: "info",
          text: `${draftADRs.length} ADR(s) still in draft/proposed`,
          nodes: draftADRs
        });
      }

      // Dangling edges
      const nodeIds = new Set(nodes.map(n => n.id));
      const dangling = edges.filter(e => !nodeIds.has(e.dst));
      if (dangling.length) {
        findings.push({
          sev: "warn",
          text: `${dangling.length} dangling reference(s) to missing nodes`,
          nodes: []
        });
      }

      // Components with specs -- positive
      if (compsWithSpec.size) {
        findings.push({
          sev: "ok",
          text: `${compsWithSpec.size} component(s) have governing specs`,
          nodes: []
        });
      }

      // All ADRs accepted -- positive
      const acceptedADRs = adrs.filter(a => (a.frontmatter || {}).status === "accepted");
      if (acceptedADRs.length) {
        findings.push({
          sev: "ok",
          text: `${acceptedADRs.length} ADR(s) are accepted`,
          nodes: []
        });
      }

      // Coverage score: weighted
      let score = 0;
      let max = 0;

      // Component coverage (40% weight)
      if (components.length) {
        score += (compsWithSpec.size / components.length) * 40;
        max += 40;
      }

      // ADR maturity (30% weight)
      if (adrs.length) {
        score += (acceptedADRs.length / adrs.length) * 30;
        max += 30;
      }

      // Spec quality -- have acceptance criteria (20% weight)
      if (specs.length) {
        const withAC = specs.length - specsNoAC.length;
        score += (withAC / specs.length) * 20;
        max += 20;
      }

      // No dangling refs (10% weight)
      if (edges.length) {
        const clean = edges.length - dangling.length;
        score += (clean / edges.length) * 10;
        max += 10;
      }

      const pct = max > 0 ? Math.round((score / max) * 100) : 0;

      return {
        score: pct,
        stats: {
          total: nodes.length,
          components: components.length,
          specs: specs.length,
          adrs: adrs.length,
          gates: gates.length,
          edges: edges.length
        },
        findings
      };
    }

    function renderHealthBadge(cov) {
      const el = document.getElementById("health-badge");
      let cls = "health-poor";
      if (cov.score >= 80) cls = "health-excellent";
      else if (cov.score >= 60) cls = "health-good";
      else if (cov.score >= 40) cls = "health-fair";

      el.className = cls;
      el.innerHTML = `${cov.score}% intent health`;
      el.id = "health-badge";
    }

    function renderCoverageDashboard(cov) {
      const area = document.getElementById("content-area");
      const barColor = cov.score >= 80 ? "var(--base0B)" :
                       cov.score >= 60 ? "var(--base0D)" :
                       cov.score >= 40 ? "var(--base0A)" : "var(--base08)";

      const cards = `
        <div class="cov-grid">
          <div class="cov-card">
            <div class="cov-card-title">Health Score</div>
            <div class="cov-card-value" style="color:${barColor}">${cov.score}%</div>
            <div class="cov-bar-track"><div class="cov-bar-fill" style="width:${cov.score}%;background:${barColor}"></div></div>
          </div>
          <div class="cov-card">
            <div class="cov-card-title">Total Nodes</div>
            <div class="cov-card-value" style="color:var(--base06)">${cov.stats.total}</div>
            <div class="cov-card-sub">${cov.stats.components} comp / ${cov.stats.specs} spec / ${cov.stats.adrs} adr / ${cov.stats.gates} gate</div>
          </div>
          <div class="cov-card">
            <div class="cov-card-title">Edges</div>
            <div class="cov-card-value" style="color:var(--base0E)">${cov.stats.edges}</div>
            <div class="cov-card-sub">relationships in the graph</div>
          </div>
          <div class="cov-card">
            <div class="cov-card-title">Findings</div>
            <div class="cov-card-value" style="color:var(--base0A)">${cov.findings.filter(f => f.sev !== "ok").length}</div>
            <div class="cov-card-sub">issues to address</div>
          </div>
        </div>
      `;

      const findingsHtml = cov.findings.map(f => {
        const sevCls = f.sev === "warn" ? "cov-sev-warn" : f.sev === "ok" ? "cov-sev-ok" : "cov-sev-info";
        const sevLabel = f.sev === "warn" ? "WARN" : f.sev === "ok" ? "PASS" : "INFO";
        const nodeLinks = f.nodes.map(n =>
          `<span class="cov-link" onclick="switchView('graph');selectNodeById('${n.id}')">${n.id}</span>`
        ).join(", ");
        return `<div class="cov-finding">
          <span class="cov-sev ${sevCls}">${sevLabel}</span>
          <span class="cov-finding-text">${esc(f.text)}${nodeLinks ? " (" + nodeLinks + ")" : ""}</span>
        </div>`;
      }).join("");

      area.innerHTML = cards + `
        <h3 style="color:var(--base06);font-size:14px;margin-bottom:10px">Findings</h3>
        ${findingsHtml}
      `;
    }

    async function renderCoverageDashboardAsync() {
      const cov = computeCoverage(graphData);
      renderCoverageDashboard(cov);
      // Try to load coverage.json for per-component details
      try {
        const res = await fetch("../../.intent/index/coverage.json");
        if (!res.ok) throw new Error();
        const covData = await res.json();
        if (covData.components && covData.components.length) {
          const area = document.getElementById("content-area");
          const levelColor = { green: "var(--base0B)", yellow: "var(--base0A)", red: "var(--base08)" };
          const levelIcon = { green: "+", yellow: "~", red: "-" };
          let compHtml = '<h3 style="color:var(--base06);font-size:14px;margin:16px 0 10px">Component Coverage</h3>';
          compHtml += '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:8px">';
          covData.components.forEach(c => {
            const col = levelColor[c.level] || "var(--base05)";
            const icon = levelIcon[c.level] || "?";
            compHtml += `<div class="cov-card" style="cursor:pointer;border-left:3px solid ${col}" onclick="switchView('graph');selectNodeById('${c.id}')">
              <div class="cov-card-title" style="color:${col}">[${icon}] ${esc(c.id)}</div>
              <div class="cov-card-sub">${c.has_spec ? 'spec' : 'no spec'} · ${c.adr_count} ADR(s) · ${c.gate_count} gate(s)</div>
            </div>`;
          });
          compHtml += '</div>';
          // Also show metrics from CLI
          if (covData.metrics) {
            const m = covData.metrics;
            compHtml += '<h3 style="color:var(--base06);font-size:14px;margin:16px 0 10px">Metrics</h3><div class="cov-grid">';
            compHtml += `<div class="cov-card"><div class="cov-card-title">Components with Spec</div><div class="cov-card-value" style="color:var(--base0B)">${m.components_with_spec.pct}%</div><div class="cov-card-sub">${m.components_with_spec.value}/${m.components_with_spec.total}</div></div>`;
            compHtml += `<div class="cov-card"><div class="cov-card-title">Specs with Acceptance</div><div class="cov-card-value" style="color:var(--base0D)">${m.specs_with_acceptance.pct}%</div><div class="cov-card-sub">${m.specs_with_acceptance.value}/${m.specs_with_acceptance.total}</div></div>`;
            compHtml += `<div class="cov-card"><div class="cov-card-title">ADRs Accepted</div><div class="cov-card-value" style="color:var(--base0E)">${m.adrs_accepted.pct}%</div><div class="cov-card-sub">${m.adrs_accepted.value}/${m.adrs_accepted.total}</div></div>`;
            compHtml += `<div class="cov-card"><div class="cov-card-title">ADRs with Status</div><div class="cov-card-value" style="color:var(--base0C)">${m.adrs_with_status.pct}%</div><div class="cov-card-sub">${m.adrs_with_status.value}/${m.adrs_with_status.total}</div></div>`;
            compHtml += '</div>';
          }
          area.innerHTML += compHtml;
        }
      } catch(e) { /* coverage.json not available, client-side view is sufficient */ }
    }

    // ---- Drift Detection View ----

    async function renderDriftDashboard() {
      const area = document.getElementById("content-area");
      document.getElementById("node-header").innerHTML = '<h2>Drift Detection</h2><div><span class="pill pill-type">intent vs code</span></div>';
      document.getElementById("breadcrumb").innerHTML = '';
      document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));

      // Try to load drift.json
      let drift;
      try {
        const res = await fetch("../../.intent/index/drift.json");
        if (!res.ok) throw new Error();
        drift = await res.json();
      } catch {
        area.innerHTML = `<div class="md-body">
          <p>No drift data available. Run <code>python tools/intent/sigil.py drift</code> to generate.</p>
        </div>`;
        return;
      }

      const hasFindings = drift.findings && drift.findings.length > 0;
      const statusColor = hasFindings ? "var(--base0A)" : "var(--base0B)";
      const statusText = hasFindings ? "Drift detected" : "Aligned";

      let html = `
        <div class="cov-grid">
          <div class="cov-card">
            <div class="cov-card-title">Status</div>
            <div class="cov-card-value" style="color:${statusColor}">${statusText}</div>
          </div>
          <div class="cov-card">
            <div class="cov-card-title">Files Scanned</div>
            <div class="cov-card-value" style="color:var(--base06)">${drift.scanned || 0}</div>
          </div>
          <div class="cov-card">
            <div class="cov-card-title">Mapped to Components</div>
            <div class="cov-card-value" style="color:var(--base0B)">${drift.mapped || 0}</div>
          </div>
          <div class="cov-card">
            <div class="cov-card-title">Unowned Files</div>
            <div class="cov-card-value" style="color:${drift.unowned ? 'var(--base09)' : 'var(--base0B)'}">${drift.unowned || 0}</div>
          </div>
        </div>
      `;

      if (drift.findings && drift.findings.length) {
        html += '<h3 style="color:var(--base06);font-size:14px;margin-bottom:10px">Findings</h3>';
        drift.findings.forEach(f => {
          if (f.type === "unowned_files") {
            html += `<div class="cov-finding">
              <span class="cov-sev cov-sev-warn">DRIFT</span>
              <span class="cov-finding-text">${f.count} file(s) not mapped to any component</span>
            </div>`;
            if (f.files) {
              html += '<div style="margin:4px 0 12px 40px;font-size:12px;color:var(--base04)">';
              f.files.slice(0, 20).forEach(fp => {
                html += `<div style="margin:2px 0"><code style="background:var(--base02);padding:1px 4px;border-radius:2px;font-size:11px">${esc(fp)}</code></div>`;
              });
              if (f.files.length > 20) html += `<div>... and ${f.files.length - 20} more</div>`;
              html += '</div>';
            }
          } else if (f.type === "no_spec") {
            html += `<div class="cov-finding">
              <span class="cov-sev cov-sev-warn">DRIFT</span>
              <span class="cov-finding-text">Components with code but no governing spec</span>
            </div>`;
            if (f.items) {
              html += '<div style="margin:4px 0 12px 40px;font-size:12px;color:var(--base04)">';
              f.items.forEach(item => { html += `<div style="margin:2px 0">${esc(item)}</div>`; });
              html += '</div>';
            }
          } else if (f.type === "spec_no_code") {
            html += `<div class="cov-finding">
              <span class="cov-sev cov-sev-info">INFO</span>
              <span class="cov-finding-text">Components with specs but no matching code files</span>
            </div>`;
            if (f.items) {
              html += '<div style="margin:4px 0 12px 40px;font-size:12px;color:var(--base04)">';
              f.items.forEach(item => {
                html += `<div style="margin:2px 0"><span class="cov-link" onclick="switchView(\'graph\');selectNodeById(\'${item}\')">${esc(item)}</span></div>`;
              });
              html += '</div>';
            }
          }
        });
      } else {
        html += `<div class="cov-finding">
          <span class="cov-sev cov-sev-ok">PASS</span>
          <span class="cov-finding-text">All code files are mapped to components with governing specs</span>
        </div>`;
      }

      area.innerHTML = html;
    }

    // ---- Review Dashboard ----

    async function renderReviewDashboard() {
      const area = document.getElementById("content-area");
      document.getElementById("node-header").innerHTML = '<h2>Intent Review</h2><div><span class="pill pill-type">code review governance</span></div>';
      document.getElementById("breadcrumb").innerHTML = '';
      document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));

      let review;
      try {
        const res = await fetch("../../.intent/index/review.json");
        if (!res.ok) throw new Error();
        review = await res.json();
      } catch {
        area.innerHTML = `<div class="md-body">
          <p>No review data available. Run <code>sigil index</code> or <code>sigil serve</code> to generate.</p>
        </div>`;
        return;
      }

      const s = review.summary || {};
      const pct = s.coverage_pct !== undefined ? s.coverage_pct : 100;
      const covColor = pct >= 80 ? "var(--base0B)" : pct >= 50 ? "var(--base0A)" : "var(--base08)";
      const covLabel = pct >= 80 ? "GOOD" : pct >= 50 ? "FAIR" : "LOW";

      // Gate summary
      const gates = review.gates || [];
      const gatesPassed = gates.filter(g => g.passed).length;
      const gatesTotal = gates.length;
      const gatesColor = gatesTotal === 0 ? "var(--base04)" : gatesPassed === gatesTotal ? "var(--base0B)" : "var(--base08)";

      let html = `
        <div class="cov-grid">
          <div class="cov-card">
            <div class="cov-card-title">Intent Coverage</div>
            <div class="cov-card-value" style="color:${covColor};font-size:36px">${pct}%</div>
            <div style="font-size:11px;color:var(--base04);margin-top:4px">${covLabel} &mdash; ${s.covered_files || 0}/${s.code_changes || 0} files governed</div>
          </div>
          <div class="cov-card">
            <div class="cov-card-title">Changes</div>
            <div class="cov-card-value" style="color:var(--base06)">${s.total_changes || 0}</div>
            <div style="font-size:11px;color:var(--base04);margin-top:4px">${s.intent_changes || 0} intent, ${s.code_changes || 0} code</div>
          </div>
          <div class="cov-card">
            <div class="cov-card-title">Gates</div>
            <div class="cov-card-value" style="color:${gatesColor}">${gatesPassed}/${gatesTotal}</div>
            <div style="font-size:11px;color:var(--base04);margin-top:4px">${gatesPassed === gatesTotal ? 'all passing' : (gatesTotal - gatesPassed) + ' failing'}</div>
          </div>
          <div class="cov-card">
            <div class="cov-card-title">Ungoverned</div>
            <div class="cov-card-value" style="color:${(s.uncovered_files || 0) > 0 ? 'var(--base09)' : 'var(--base0B)'}">${s.uncovered_files || 0}</div>
            <div style="font-size:11px;color:var(--base04);margin-top:4px">files without component mapping</div>
          </div>
        </div>
      `;

      // Intent document changes
      const intentChanges = review.intent_changes || [];
      if (intentChanges.length > 0) {
        html += '<h3 style="color:var(--base06);font-size:14px;margin:16px 0 10px">Intent Document Changes</h3>';
        const statusBadge = (s) => {
          const colors = { A: "var(--base0B)", M: "var(--base0D)", D: "var(--base08)", R: "var(--base0E)" };
          const labels = { A: "added", M: "modified", D: "deleted", R: "renamed" };
          return `<span style="display:inline-block;padding:1px 6px;border-radius:3px;font-size:10px;font-weight:600;background:${colors[s] || 'var(--base03)'};color:var(--base00);margin-right:6px">${(labels[s] || s).toUpperCase()}</span>`;
        };
        intentChanges.forEach(ic => {
          const nodeId = ic.path.split("/").pop().replace(/\.md$/, "").replace(/\.yaml$/, "");
          html += `<div style="margin:4px 0;font-size:12px">
            ${statusBadge(ic.status)}
            <code style="background:var(--base02);padding:1px 4px;border-radius:2px;font-size:11px">${esc(ic.path)}</code>
          </div>`;
        });
      }

      // Governed code changes by component
      const covered = review.covered || {};
      const governance = review.governance || {};
      const coveredComps = Object.keys(covered);
      if (coveredComps.length > 0) {
        html += '<h3 style="color:var(--base06);font-size:14px;margin:16px 0 10px">Governed Code Changes</h3>';
        coveredComps.forEach(cid => {
          const files = covered[cid];
          const gov = governance[cid] || {};
          html += `<div style="margin:8px 0;padding:10px;background:var(--base02);border-radius:6px">`;
          html += `<div style="font-weight:600;font-size:13px;margin-bottom:6px">
            <span class="cov-link" onclick="switchView('graph');selectNodeById('${cid}')">${esc(cid)}</span>
            <span style="color:var(--base04);font-weight:400;margin-left:8px">${files.length} file(s)</span>
          </div>`;

          // Governance badges
          const govParts = [];
          if (gov.specs && gov.specs.length) {
            govParts.push(gov.specs.map(s =>
              `<span class="cov-link" onclick="switchView('graph');selectNodeById('${s.id}')" style="font-size:11px">${esc(s.id)}</span>`
            ).join(' '));
          }
          if (gov.adrs && gov.adrs.length) {
            govParts.push(gov.adrs.map(a =>

    // ---- Impact Radar ----

    function getBlastRadius(nodeId, graph) {
      const rings = [[], [], []]; // direct, secondary, tertiary
      const visited = new Set([nodeId]);

      function getConnected(id) {
        const out = [];
        graph.edges.forEach(e => {
          if (e.src === id && !visited.has(e.dst)) out.push({ id: e.dst, type: e.type, dir: "out" });
          if (e.dst === id && !visited.has(e.src)) out.push({ id: e.src, type: e.type, dir: "in" });
        });
        return out;
      }

      // Ring 0: direct connections
      const direct = getConnected(nodeId);
      direct.forEach(d => { visited.add(d.id); rings[0].push(d); });

      // Ring 1: secondary
      direct.forEach(d => {
        getConnected(d.id).forEach(s => {
          if (!visited.has(s.id)) { visited.add(s.id); rings[1].push(s); }
        });
      });

      // Ring 2: tertiary
      rings[1].forEach(d => {
        getConnected(d.id).forEach(t => {
          if (!visited.has(t.id)) { visited.add(t.id); rings[2].push(t); }
        });
      });

      return rings;
    }

    function renderRadarView(node) {
      const radarSvg = d3.select("#radar-svg");
      radarSvg.selectAll("*").remove();
      if (!node) return;

      const width = radarSvg.node().clientWidth;
      const height = radarSvg.node().clientHeight;
      const cx = width / 2, cy = height / 2;
      const maxR = Math.min(width, height) / 2 - 40;
      const rings = getBlastRadius(node.id, graphData);
      const ringRadii = [maxR * 0.3, maxR * 0.6, maxR * 0.9];
      const ringLabels = ["direct", "secondary", "tertiary"];
      const ringColors = ["rgba(187,255,0,0.06)", "rgba(152,113,254,0.04)", "rgba(69,138,226,0.03)"];

      const g = radarSvg.append("g");

      // Draw rings
      ringRadii.slice().reverse().forEach((r, i) => {
        const idx = 2 - i;
        g.append("circle")
          .attr("cx", cx).attr("cy", cy).attr("r", r)
          .attr("fill", ringColors[idx])
          .attr("stroke", "var(--base02)").attr("stroke-width", 0.5);
      });

      // Ring labels
      ringRadii.forEach((r, i) => {
        g.append("text")
          .attr("class", "radar-ring-label")
          .attr("x", cx).attr("y", cy - r + 12)
          .text(ringLabels[i] + " (" + rings[i].length + ")");
      });

      // Center node
      g.append("circle")
        .attr("cx", cx).attr("cy", cy).attr("r", 16)
        .attr("fill", nodeColors[node.type] || "#5a5d62");
      g.append("text")
        .attr("class", "radar-center-label")
        .attr("x", cx).attr("y", cy)
        .text(node.id);

      // Place nodes in rings
      rings.forEach((ring, ri) => {
        const r = ringRadii[ri];
        ring.forEach((item, ni) => {
          const angle = (2 * Math.PI * ni / ring.length) - Math.PI / 2;
          const nx = cx + r * Math.cos(angle);
          const ny = cy + r * Math.sin(angle);

          const targetNode = graphData.nodes.find(n => n.id === item.id);
          const color = targetNode ? (nodeColors[targetNode.type] || "#5a5d62") : "#5a5d62";

          // Edge line
          g.append("line")
            .attr("class", "radar-edge")
            .attr("x1", cx).attr("y1", cy)
            .attr("x2", nx).attr("y2", ny);

          // Node
          const ng = g.append("g")
            .attr("class", "radar-node")
            .attr("transform", `translate(${nx},${ny})`)
            .on("click", () => {
              selectNodeById(item.id);
              if (activeView === "radar") renderRadarView(allNodes.find(n => n.id === item.id));
            });

          ng.append("circle")
            .attr("r", 7).attr("fill", color);
          ng.append("text")
            .attr("y", 12).text(item.id);
        });
      });

      // Total blast radius count
      const total = rings[0].length + rings[1].length + rings[2].length;
      g.append("text")
        .attr("x", 14).attr("y", 20)
        .attr("fill", "var(--base04)").attr("font-size", 11)
        .text(`Blast radius: ${total} node(s)`);
    }

    function renderBlastRadiusTab(node) {
      const area = document.getElementById("content-area");
      const rings = getBlastRadius(node.id, graphData);
      const ringNames = ["Direct", "Secondary", "Tertiary"];

      let html = `<h3 style="color:var(--base06);font-size:14px;margin-bottom:4px">Blast Radius for ${esc(node.id)}</h3>
        <div style="color:var(--base03);font-size:12px;margin-bottom:14px">What depends on or is connected to this node</div>`;

      rings.forEach((ring, i) => {
        if (!ring.length) return;
        html += `<h4 style="color:var(--base14);font-size:12px;margin:12px 0 6px">${ringNames[i]} (${ring.length})</h4>`;
        html += `<ul class="edge-list">${ring.map(item => {
          const targetNode = graphData.nodes.find(n => n.id === item.id);
          const typeLabel = targetNode ? targetNode.type : "?";
          return `<li>
            <span class="edge-dir">${item.dir === "out" ? "&rarr;" : "&larr;"}</span>
            <span class="edge-type">${item.type}</span>
            <span class="edge-target" onclick="selectNodeById('${item.id}')">${item.id}</span>
            <span style="color:var(--base03);font-size:11px">${typeLabel}</span>
          </li>`;
        }).join("")}</ul>`;
      });

      const total = rings[0].length + rings[1].length + rings[2].length;
      if (!total) html += '<div style="color:var(--base03);font-size:13px;margin:10px 0">No connections found (isolated node).</div>';

    // ---- Hierarchy View ----

    function renderHierarchyView() {
      const hsvg = d3.select("#hierarchy-svg");
      hsvg.selectAll("*").remove();
      const width = hsvg.node().clientWidth;
      const height = hsvg.node().clientHeight;
      const g = hsvg.append("g");

      // Zoom
      hsvg.call(d3.zoom().scaleExtent([0.3, 4]).on("zoom", (ev) => {
        g.attr("transform", ev.transform);
      }));

      // Layer assignment: components (0), specs/interfaces/gates (1), adrs (2)
      const layerMap = { component: 0, interface: 0, spec: 1, gate: 1, adr: 2, risk: 2, rollout: 2 };
      const layerNames = ["Components & Interfaces", "Specs & Gates", "ADRs & Decisions"];
      const layers = [[], [], []];
      const nodes = graphData.nodes;

      nodes.forEach(n => {
        const layer = layerMap[n.type] !== undefined ? layerMap[n.type] : 1;
        layers[layer].push(n);
      });

      const layerHeight = height / (layers.length + 1);
      const padding = 60;
      const positions = {};

      // Draw layer labels and position nodes
      layers.forEach((layer, li) => {
        const y = padding + (li + 0.5) * layerHeight;

        // Layer label
        g.append("text")
          .attr("x", 16).attr("y", y - 20)
          .attr("fill", "var(--base03)").attr("font-size", 10)
          .attr("font-weight", 600).attr("text-transform", "uppercase")
          .attr("letter-spacing", "1px")
          .text(layerNames[li]);

        // Divider line
        if (li > 0) {
          g.append("line")
            .attr("x1", 0).attr("x2", width)
            .attr("y1", y - layerHeight / 2).attr("y2", y - layerHeight / 2)
            .attr("stroke", "var(--base02)").attr("stroke-dasharray", "4,4");
        }

        // Position nodes evenly
        const nodeSpacing = (width - 2 * padding) / Math.max(layer.length, 1);
        layer.forEach((n, ni) => {
          const x = padding + nodeSpacing * (ni + 0.5);
          positions[n.id] = { x, y };
        });
      });

      // Draw edges
      graphData.edges.forEach(e => {
        const src = positions[e.src];
        const dst = positions[e.dst];
        if (!src || !dst) return;
        g.append("line")
          .attr("x1", src.x).attr("y1", src.y)
          .attr("x2", dst.x).attr("y2", dst.y)
          .attr("stroke", "var(--base02)").attr("stroke-width", 1);
      });

      // Draw nodes
      nodes.forEach(n => {
        const pos = positions[n.id];
        if (!pos) return;
        const ng = g.append("g")
          .attr("transform", `translate(${pos.x},${pos.y})`)
          .attr("cursor", "pointer")
          .on("click", () => selectNodeById(n.id))
          .on("mouseenter", (ev) => showTooltip(ev, n))
          .on("mousemove", (ev) => moveTooltip(ev))
          .on("mouseleave", () => hideTooltip());

        ng.append("circle")
          .attr("r", n.type === "component" ? 12 : 8)
          .attr("fill", nodeColors[n.type] || "#5a5d62")
          .attr("stroke", selectedNode && selectedNode.id === n.id ? "#f8f6f2" : "none")
          .attr("stroke-width", 2);

        ng.append("text")
          .attr("dy", n.type === "component" ? -18 : -14)
          .attr("text-anchor", "middle")
          .attr("fill", "var(--base04)").attr("font-size", 10)
          .text(n.id);
      });
    }

    // ---- Matrix View ----

    function renderMatrixView() {
      const container = document.getElementById("matrix-container");
      document.getElementById("node-header").innerHTML = '<h2>Dependency Matrix</h2><div><span class="pill pill-type">relationships grid</span></div>';
      document.getElementById("breadcrumb").innerHTML = '';
      document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));

      if (!graphData || !graphData.nodes.length) {
        container.innerHTML = '<div style="color:var(--base03);padding:20px">No nodes.</div>';
        return;
      }

      const nodes = graphData.nodes;
      const edges = graphData.edges;

      // Build adjacency: src -> dst -> [edge types]
      const adj = {};
      edges.forEach(e => {
        if (!adj[e.src]) adj[e.src] = {};
        if (!adj[e.src][e.dst]) adj[e.src][e.dst] = [];
        if (!adj[e.src][e.dst].includes(e.type)) adj[e.src][e.dst].push(e.type);
      });

      // Color intensity based on edge count
      function cellColor(types) {
        if (!types || !types.length) return "transparent";
        const intensity = Math.min(types.length / 3, 1);
        // Use edge type for color
        const primary = types[0];
        const base = edgeColors[primary] || "var(--base02)";
        return `color-mix(in srgb, ${base} ${30 + intensity * 50}%, transparent)`;
      }

      // Build HTML table
      let html = '<table class="matrix-table"><thead><tr><th></th>';
      nodes.forEach(n => {
        const color = nodeColors[n.type] || "var(--base04)";
        html += `<th class="col-header" style="color:${color}" title="${n.id}: ${esc(n.title || '')}">${n.id}</th>`;
      });
      html += '</tr></thead><tbody>';

      nodes.forEach(src => {
        const srcColor = nodeColors[src.type] || "var(--base04)";
        html += `<tr><th class="row-header" style="color:${srcColor}" title="${src.id}: ${esc(src.title || '')}">${src.id}</th>`;
        nodes.forEach(dst => {
          if (src.id === dst.id) {
            html += '<td class="matrix-cell matrix-diag"></td>';
          } else {
            const types = (adj[src.id] && adj[src.id][dst.id]) || [];
            const bg = cellColor(types);
            const title = types.length ? `${src.id} → ${dst.id}: ${types.join(', ')}` : '';
            html += `<td class="matrix-cell" style="background:${bg}" title="${title}"
              onclick="${types.length ? `selectNodeById('${src.id}')` : ''}"></td>`;
          }
        });
        html += '</tr>';
      });
      html += '</tbody></table>';

      container.innerHTML = html;

      // Summary in content area
      const totalRelationships = edges.length;
      const edgeTypeCounts = {};
      edges.forEach(e => { edgeTypeCounts[e.type] = (edgeTypeCounts[e.type] || 0) + 1; });

      const summaryHtml = `
        <div class="cov-grid">
          <div class="cov-card">
            <div class="cov-card-title">Relationships</div>
            <div class="cov-card-value" style="color:var(--base0E)">${totalRelationships}</div>
          </div>
          <div class="cov-card">
            <div class="cov-card-title">Density</div>
            <div class="cov-card-value" style="color:var(--base0D)">${(totalRelationships / (nodes.length * (nodes.length - 1)) * 100).toFixed(1)}%</div>
            <div class="cov-card-sub">of possible connections</div>
          </div>
        </div>
        <h3 style="color:var(--base06);font-size:14px;margin-bottom:10px">Edge Types</h3>
        ${Object.entries(edgeTypeCounts).sort((a,b) => b[1]-a[1]).map(([type, count]) => `
          <div class="cov-finding">
            <span class="cov-sev" style="background:${edgeColors[type] || 'var(--base02)'};color:var(--base00)">${count}</span>
            <span class="cov-finding-text">${type}</span>
          </div>
        `).join("")}
      `;
      document.getElementById("content-area").innerHTML = summaryHtml;
    }

    // ---- Timeline View ----

    async function renderTimelineView() {
      const container = document.getElementById("timeline-container");
      document.getElementById("node-header").innerHTML = '<h2>Intent Timeline</h2><div><span class="pill pill-type">evolution history</span></div>';
      document.getElementById("breadcrumb").innerHTML = '';
      document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));

      let timeline;
      try {
        const res = await fetch("../../.intent/index/timeline.json");
        if (!res.ok) throw new Error();
        timeline = await res.json();
      } catch {
        container.innerHTML = `<div class="tl-empty">
          No timeline data. Run <code>python3 tools/intent/sigil.py timeline</code> to generate.
        </div>`;
        document.getElementById("content-area").innerHTML = container.innerHTML;
        return;
      }

      const events = timeline.events || [];
      if (!events.length) {
        container.innerHTML = '<div class="tl-empty">No intent events found.</div>';
        document.getElementById("content-area").innerHTML = container.innerHTML;
        return;
      }

      // Group events by node type (swim lanes)
      const laneOrder = ["component", "interface", "spec", "gate", "adr", "risk", "rollout", "unknown"];
      const laneNames = { component: "Components", interface: "Interfaces", spec: "Specs", gate: "Gates", adr: "ADRs", risk: "Risks", rollout: "Rollouts", unknown: "Other" };
      const lanes = {};
      events.forEach(ev => {
        const lane = laneOrder.includes(ev.node_type) ? ev.node_type : "unknown";
        if (!lanes[lane]) lanes[lane] = [];
        lanes[lane].push(ev);
      });

      // Time range
      const dates = events.map(e => new Date(e.date).getTime());
      const minDate = Math.min(...dates);
      const maxDate = Math.max(...dates);
      const range = maxDate - minDate || 1;

      // Build HTML
      const trackWidth = container.clientWidth - 140;
      const actionIcons = { added: "+", modified: "~", removed: "x" };

      let html = `<div class="tl-header">Intent Evolution<span>${events.length} events</span></div>`;

      // Tooltip element
      html += '<div id="tl-tooltip" class="tl-event-tooltip"></div>';

      laneOrder.forEach(laneKey => {
        if (!lanes[laneKey]) return;
        const laneEvents = lanes[laneKey];

        html += `<div class="tl-swimlane">
          <div class="tl-lane-label" style="color:${nodeColors[laneKey] || 'var(--base04)'}">${laneNames[laneKey]}</div>
          <div class="tl-lane-track">`;

        // Deduplicate overlapping positions
        const positions = [];
        laneEvents.forEach((ev, i) => {
          const t = new Date(ev.date).getTime();
          let pct = ((t - minDate) / range) * 100;
          // Nudge if too close to previous
          while (positions.some(p => Math.abs(p - pct) < 3)) pct += 3;
          positions.push(pct);

          const color = nodeColors[laneKey] || '#5a5d62';
          const icon = actionIcons[ev.action] || "?";
          html += `<div class="tl-event" data-action="${ev.action}" data-idx="${i}" data-lane="${laneKey}"
            style="left:calc(${Math.min(pct, 95)}% - 12px);background:${color}"
            onclick="selectNodeById('${ev.node_id}')"
            onmouseenter="showTlTooltip(event, ${JSON.stringify(ev).replace(/"/g, '&quot;')})"
            onmouseleave="hideTlTooltip()">${icon}</div>`;
        });

        html += `</div></div>`;
      });

      // Time axis
      const tickCount = Math.min(6, events.length);
      html += '<div class="tl-axis" style="position:relative;height:24px">';
      for (let i = 0; i < tickCount; i++) {
        const t = minDate + (range * i / (tickCount - 1 || 1));
        const d = new Date(t);
        const label = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) + ' ' + d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
        const pct = (i / (tickCount - 1 || 1)) * 100;
        html += `<span class="tl-axis-label" style="left:${pct}%">${label}</span>`;
      }
      html += '</div>';

      // Summary stats in content area
      const nodesSeen = new Set(events.map(e => e.node_id));
      const addEvents = events.filter(e => e.action === "added").length;
      const modEvents = events.filter(e => e.action === "modified").length;
      const uniqueCommits = new Set(events.map(e => e.sha)).size;

      const summaryHtml = `
        <div class="cov-grid">
          <div class="cov-card">
            <div class="cov-card-title">Total Events</div>
            <div class="cov-card-value" style="color:var(--base0F)">${events.length}</div>
          </div>
          <div class="cov-card">
            <div class="cov-card-title">Nodes Touched</div>
            <div class="cov-card-value" style="color:var(--base0D)">${nodesSeen.size}</div>
          </div>
          <div class="cov-card">
            <div class="cov-card-title">Additions</div>
            <div class="cov-card-value" style="color:var(--base0B)">${addEvents}</div>
          </div>
          <div class="cov-card">
            <div class="cov-card-title">Modifications</div>
            <div class="cov-card-value" style="color:var(--base0A)">${modEvents}</div>
          </div>
        </div>
        <h3 style="color:var(--base06);font-size:14px;margin-bottom:10px">Event Log</h3>
        ${events.slice().reverse().map(ev => `
          <div class="cov-finding">
            <span class="cov-sev ${ev.action === 'added' ? 'cov-sev-ok' : ev.action === 'removed' ? 'cov-sev-warn' : 'cov-sev-info'}">${ev.action.toUpperCase()}</span>
            <span class="cov-finding-text">
              <span class="cov-link" onclick="switchView('graph');selectNodeById('${ev.node_id}')">${ev.node_id}</span>
              ${esc(ev.node_title || '')}
              <span style="color:var(--base03);font-size:11px;margin-left:6px">${ev.sha === 'working-tree' ? 'working tree' : ev.sha}</span>
            </span>
          </div>
        `).join("")}
      `;

      container.innerHTML = html;
      document.getElementById("content-area").innerHTML = summaryHtml;
    }

    function showTlTooltip(ev, data) {
      const tt = document.getElementById("tl-tooltip");
      if (!tt) return;
      const date = new Date(data.date).toLocaleString();
      tt.innerHTML = `
        <div style="color:var(--base0D);font-weight:600">${esc(data.node_id)}</div>
        <div style="color:var(--base06);margin:2px 0">${esc(data.node_title || '')}</div>
        <div style="color:var(--base04);font-size:11px">${data.action} &middot; ${date}</div>
        <div style="color:var(--base03);font-size:11px;margin-top:2px">${esc(data.message || '')}</div>
      `;
      tt.classList.add("show");
      tt.style.left = (ev.clientX + 12) + "px";
      tt.style.top = (ev.clientY - 60) + "px";
    }

    function hideTlTooltip() {
      const tt = document.getElementById("tl-tooltip");
      if (tt) tt.classList.remove("show");
    }

      activeView = view;

      const svgEl = document.getElementById("svg");
      const radarEl = document.getElementById("radar-svg");

        renderCoverageDashboardAsync();

    // ---- Core UI ----

    function buildLegend() {
      const types = [...new Set(graphData.nodes.map(n => n.type))];
      const el = document.getElementById("legend");
      el.innerHTML = types.map(t =>
        `<div class="legend-item"><div class="legend-dot" style="background:${nodeColors[t] || '#5a5d62'}"></div>${t}</div>`
      ).join("");
    }

    function buildBreadcrumb(node) {
      const el = document.getElementById("breadcrumb");
      if (!node) { el.innerHTML = ""; return; }

      // Walk up the hierarchy: ADR → Spec (via decided_by) → Component (via belongs_to)
      const chain = [node];
      const visited = new Set([node.id]);

      function findParent(id) {
        // Try decided_by first (ADR → Spec), then belongs_to (Spec/ADR → Component)
        for (const relType of ["decided_by", "belongs_to"]) {
          const edge = graphData.edges.find(e => e.src === id && e.type === relType && !visited.has(e.dst));
          if (edge) {
            const parent = graphData.nodes.find(n => n.id === edge.dst);
            if (parent) return parent;
          }
        }
        return null;
      }

      let current = node;
      while (current) {
        const parent = findParent(current.id);
        if (parent) {
          visited.add(parent.id);
          chain.unshift(parent);
          current = parent;
        } else {
          break;
        }
      }

      el.innerHTML = chain.map((n, i) => {
        const sep = i > 0 ? '<span class="sep">&rsaquo;</span>' : '';
        const label = n.type === "component" ? n.title || n.id : n.id;
        return `${sep}<span onclick="selectNodeById('${n.id}')">${label}</span>`;
      }).join("");
    }

    function renderHeader(node) {
      const el = document.getElementById("node-header");
      const fm = node.frontmatter || node._frontmatter || {};
      const status = fm.status;
      const statusPill = status
        ? `<span class="pill pill-status" data-status="${status}">${status}</span>`
        : '';
      // Blast radius count
      const rings = getBlastRadius(node.id, graphData);
      const total = rings[0].length + rings[1].length + rings[2].length;
      const radiusPill = total > 0
        ? `<span class="pill" style="background:var(--base02);color:var(--base09)">${total} connected</span>`
        : '';
      el.innerHTML = `
        <h2>${esc(node.title || node.id)}</h2>
        <div>
          <span class="pill pill-type">${node.type}</span>
          <span class="pill pill-id">${node.id}</span>
          ${statusPill}${radiusPill}
        </div>`;
    }

    function processHumanPP(html) {
      html = html.replace(/(?<![<\w])!!([^!\n]+?)!!/g, '<span class="marker-attention">!! $1</span>');
      html = html.replace(/(?<![<\w])!!\s/g, '<span class="marker-attention">!!</span> ');
      html = html.replace(/(?<![<\w])\?\?([^?\n]+?)\?\?/g, '<span class="marker-uncertainty">?? $1</span>');
      html = html.replace(/(?<![<\w])\?\?\s/g, '<span class="marker-uncertainty">??</span> ');
      html = html.replace(/(?<![<\w])&gt;&gt;([^<\n]+?)(?=<|$)/gm, '<span class="marker-reference">&gt;&gt; $1</span>');
      html = html.replace(/(?<![<\w])&gt;&gt;\s/g, '<span class="marker-reference">&gt;&gt;</span> ');
      html = html.replace(/\b(FIXME|BUG|XXX)\b/g, '<span class="marker-attention">$1</span>');
      html = html.replace(/\b(TODO|HACK)\b/g, '<span class="marker-uncertainty">$1</span>');
      html = html.replace(/\b(NOTE|NB)\b/g, '<span class="marker-reference">$1</span>');
      html = html.replace(/\[\[([A-Z]+-[A-Za-z0-9-]+)\]\]/g,
        '<span class="wikilink" onclick="selectNodeById(\'$1\')">$1</span>');
      return html;
    }

    async function renderContent(node) {
      const area = document.getElementById("content-area");

      if (node.type === "component") {
        area.innerHTML = '<div class="loading">Loading component...</div>';
        try {
          const res = await fetch("../../" + node.path);
          const text = await res.text();
          area.innerHTML = `<div class="md-body"><pre><code>${esc(text)}</code></pre></div>`;
        } catch {
          area.innerHTML = '<div class="loading">Could not load file.</div>';
        }
        return;
      }

      area.innerHTML = '<div class="loading">Loading...</div>';
      try {
        const res = await fetch("../../" + node.path);
        const text = await res.text();
        let body = text;
        const fmMatch = text.match(/^---\n([\s\S]*?)\n---\n([\s\S]*)$/);
        if (fmMatch) {
          body = fmMatch[2];
          const fm = {};
          fmMatch[1].split("\n").forEach(line => {
            const kv = line.match(/^(\w+):\s*(.+)$/);
            if (kv) fm[kv[1]] = kv[2];
          });
          node._frontmatter = fm;
          renderHeader(node);
        }
        let html = marked.parse(body);
        html = processHumanPP(html);
        area.innerHTML = `<div class="md-body">${html}</div>`;
      } catch {
        area.innerHTML = '<div class="loading">Could not load file content.</div>';
      }
    }

    function renderGraph(node) {
      const area = document.getElementById("content-area");
      const outgoing = graphData.edges.filter(e => e.src === node.id);
      const incoming = graphData.edges.filter(e => e.dst === node.id);
      const dedup = (edges) => {
        const seen = new Set();
        return edges.filter(e => {
          const key = `${e.type}-${e.src}-${e.dst}`;
          if (seen.has(key)) return false;
          seen.add(key); return true;
        });
      };
      const renderEdges = (edges, dir) => {
        if (!edges.length) return '<div style="color:var(--base03);font-size:13px;margin:6px 0">None</div>';
        return `<ul class="edge-list">${dedup(edges).map(e => {
          const target = dir === "out" ? e.dst : e.src;
          return `<li>
            <span class="edge-dir">${dir === "out" ? "&rarr;" : "&larr;"}</span>
            <span class="edge-type">${e.type}</span>
            <span class="edge-target" onclick="selectNodeById('${target}')">${target}</span>
          </li>`;
        }).join("")}</ul>`;
      };
      area.innerHTML = `
        <h3 style="color:var(--base06);font-size:14px;margin-bottom:8px">Outgoing (${dedup(outgoing).length})</h3>
        ${renderEdges(outgoing, "out")}
        <h3 style="color:var(--base06);font-size:14px;margin:16px 0 8px">Incoming (${dedup(incoming).length})</h3>
        ${renderEdges(incoming, "in")}
      `;
    }

    function renderRaw(node) {
      const area = document.getElementById("content-area");
      const clean = {...node};
      delete clean._frontmatter;
      delete clean.x; delete clean.y;
      delete clean.vx; delete clean.vy;
      delete clean.fx; delete clean.fy;
      delete clean.index;
      area.innerHTML = `<div class="md-body"><pre><code>${esc(JSON.stringify(clean, null, 2))}</code></pre></div>`;
    }

    function showTab(tab) {
      activeTab = tab;
      document.querySelectorAll(".tab").forEach(t => t.classList.toggle("active", t.dataset.tab === tab));
      if (!selectedNode) return;
      if (tab === "content") renderContent(selectedNode);
      else if (tab === "graph") renderGraph(selectedNode);
      else if (tab === "radar") renderBlastRadiusTab(selectedNode);
      else if (tab === "raw") renderRaw(selectedNode);
    }

    function selectNodeById(id) {
      const node = allNodes.find(n => n.id === id);
      if (node) selectNode(node);
    }

    function selectNode(node) {
      selectedNode = node;
      renderHeader(node);
      buildBreadcrumb(node);
      showTab(activeTab);
      d3.selectAll("#svg circle")
        .attr("stroke", d => d && d.id === node.id ? "#f8f6f2" : "none")
        .attr("stroke-width", d => d && d.id === node.id ? 2.5 : 0);
      if (activeView === "radar") renderRadarView(node);
    }

    // ---- Tooltip ----

    function showTooltip(ev, d) {
      const tt = document.getElementById("tooltip");
      const fm = d.frontmatter || {};
      const statusColor = {
        accepted: "var(--base0B)", draft: "var(--base0A)",
        proposed: "var(--base0E)", active: "var(--base0B)",
        rejected: "var(--base08)"
      };
      const statusHtml = fm.status
        ? `<span class="tt-status" style="background:${statusColor[fm.status] || 'var(--base03)'};color:var(--base00)">${fm.status}</span>`
        : '';
