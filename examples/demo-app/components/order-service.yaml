id: COMP-order-service
name: Order Service

owners:
  - team-platform

paths:
  - services/orders/**

interfaces:
  provides:
    - API-ORDERS-V1
  consumes:
    - API-CATALOG-V1
    - API-CART-V1
    - API-AUTH-V1
    - API-PAYMENTS-V1

dependency_policy:
  allowed_components:
    - COMP-catalog-service
    - COMP-cart-service
    - COMP-auth-service
    - COMP-notification-service
    - COMP-payment-gateway

attributes:
  tier: 1
  data: [orders, pii]
  runtime: [docker]
