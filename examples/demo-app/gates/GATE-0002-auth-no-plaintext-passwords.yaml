id: GATE-0002
type: security
status: active

applies_to:
  - node: API-AUTH-V1
  - node: COMP-auth-service

enforced_by:
  kind: command
  workdir: .
  command: ["bash", "-lc", "
    # Verify that auth service never stores or returns plaintext passwords.
    # This is a simplified security gate for the demo.
    AUTH_CODE=$(cat services/auth/auth.py)

    # Check 1: hash_password function must exist
    echo \"$AUTH_CODE\" | grep -q 'def hash_password' || { echo 'FAIL: hash_password function missing'; exit 1; }

    # Check 2: password should never appear in a return/response without hashing
    # Look for 'password' in return statements (crude but effective for demo)
    RETURNS_WITH_PASSWORD=$(echo \"$AUTH_CODE\" | grep 'return.*password' | grep -v 'hash' || true)
    if [ -n \"$RETURNS_WITH_PASSWORD\" ]; then
      echo \"FAIL: password appears in return statement without hashing\"
      echo \"$RETURNS_WITH_PASSWORD\"
      exit 1
    fi

    # Check 3: SECRET should not be an empty string
    echo \"$AUTH_CODE\" | grep -q 'SECRET = \"\"' && { echo 'FAIL: SECRET is empty'; exit 1; }

    echo 'PASS: auth security checks passed'
  "]

policy:
  mode: "block"
  on_fail: "block"

docs:
  summary: "Ensures auth service hashes passwords and never returns them in plaintext"
  owner: "team-platform"
