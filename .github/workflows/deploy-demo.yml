name: Refresh live demo

# Automatically regenerates docs/index.html (the live demo) whenever the
# demo app's intent graph or the viewer changes. Commits the result to main
# so GitHub Pages (legacy mode, /docs) picks it up.

on:
  push:
    branches: [main]
    paths:
      - "examples/demo-app/**"
      - "npm/lib/sigil_viewer.html"
      - "npm/lib/sigil.py"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-demo:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install sigil
        run: pip install .

      - name: Index demo app graph
        run: sigil index --repo examples/demo-app

      - name: Export viewer to docs/index.html
        run: sigil export --repo examples/demo-app --output docs/index.html

      - name: Commit if changed
        run: |
          git config user.name "sigil-bot"
          git config user.email "sigil-bot@users.noreply.github.com"
          git add docs/index.html
          if git diff --cached --quiet; then
            echo "docs/index.html unchanged, skipping commit"
          else
            git commit -m "chore: refresh live demo [skip ci]"
            git push
          fi
