name: Refresh live demo

# Automatically regenerates docs/demo/index.html (the interactive viewer) whenever the
# demo app's intent graph or the viewer changes. Commits the result to main
# so GitHub Pages (legacy mode, /docs) picks it up.
# docs/index.html is the marketing landing page — managed manually, not overwritten here.

on:
  push:
    branches: [main]
    paths:
      - "examples/demo-app/**"
      - "tools/intent_viewer/index.html"
      - "npm/lib/sigil_viewer.html"
      - "npm/lib/sigil.py"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-demo:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install sigil
        run: pip install .

      - name: Index demo app graph
        run: sigil index --repo examples/demo-app

      - name: Export viewer to docs/demo/index.html
        run: |
          mkdir -p docs/demo
          sigil export --repo examples/demo-app --output docs/demo/index.html
          # Fix favicon paths: viewer is at docs/demo/, assets are at docs/branding/
          sed -i 's|href="branding/|href="../branding/|g' docs/demo/index.html
          sed -i 's|content="branding/|content="../branding/|g' docs/demo/index.html

      - name: Commit if changed
        run: |
          git config user.name "sigil-bot"
          git config user.email "sigil-bot@users.noreply.github.com"
          git add docs/demo/index.html
          if git diff --cached --quiet; then
            echo "docs/demo/index.html unchanged, skipping commit"
          else
            git commit -m "chore: refresh live demo [skip ci]"
            git push
          fi
