name: update-badge

on:
  push:
    branches: [main]

jobs:
  badge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install sigil
        run: pip install .

      - name: Regenerate intent badge
        run: sigil badge

      - name: Commit badge if changed
        run: |
          git config user.name "sigil-bot"
          git config user.email "sigil-bot@users.noreply.github.com"
          git add .intent/badge.svg
          if git diff --cached --quiet; then
            echo "Badge unchanged, skipping commit"
          else
            git commit -m "chore: update intent coverage badge [skip ci]"
            git push
          fi
