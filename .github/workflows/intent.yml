name: sigil

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sigil:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install sigil
        run: pip install .

      - name: Run sigil CI pipeline
        run: sigil ci

      - name: Gate enforcement
        run: sigil check

      - name: Drift detection
        run: sigil drift || true

      - name: Build timeline
        run: sigil timeline || true

      - name: Generate export snapshot
        run: sigil export

      - name: Compute graph diff
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          sigil diff "$BASE" "$HEAD" --out .intent/index/diff.json --md .intent/index/diff.md

      - name: Sigil PR Analysis
        env:
          GH_TOKEN: ${{ github.token }}
        run: sigil pr ${{ github.event.pull_request.number }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sigil-artifacts
          path: |
            .intent/index/graph.json
            .intent/index/diff.json
            .intent/badge.svg
            .intent/export.html
            .intent/index/drift.json
            .intent/index/timeline.json
            .intent/index/scan.json
