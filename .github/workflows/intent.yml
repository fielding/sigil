name: sigil

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sigil:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r tools/intent/requirements.txt

      - name: Build intent index
        run: python tools/intent/sigil.py index

      - name: Lint intent docs
        run: python tools/intent/sigil.py lint

      - name: Run gate checks
        run: python tools/intent/sigil.py check

      - name: Drift detection
        run: python tools/intent/sigil.py drift || true

      - name: Build timeline
        run: python tools/intent/sigil.py timeline || true

      - name: Generate coverage badge
        run: python tools/intent/sigil.py badge

      - name: Generate export snapshot
        run: python tools/intent/sigil.py export

      - name: Compute graph diff
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          python tools/intent/sigil.py diff "$BASE" "$HEAD" --out .intent/index/diff.json --md .intent/index/diff.md

      - name: Sigil PR Analysis
        env:
          GH_TOKEN: ${{ github.token }}
        run: python tools/intent/sigil.py pr ${{ github.event.pull_request.number }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sigil-artifacts
          path: |
            .intent/index/graph.json
            .intent/index/diff.json
            .intent/badge.svg
            .intent/export.html
            .intent/index/drift.json
            .intent/index/timeline.json
