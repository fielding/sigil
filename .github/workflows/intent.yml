name: sigil

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sigil:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r tools/intent/requirements.txt

      - name: Build intent index
        run: python tools/intent/sigil.py index

      - name: Lint intent docs
        run: python tools/intent/sigil.py lint

      - name: Run gate checks
        run: python tools/intent/sigil.py check

      - name: Drift detection
        run: python tools/intent/sigil.py drift || true

      - name: Build timeline
        run: python tools/intent/sigil.py timeline || true

      - name: Generate coverage badge
        run: python tools/intent/sigil.py badge

      - name: Generate export snapshot
        run: python tools/intent/sigil.py export

      - name: Compute graph diff
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          python tools/intent/sigil.py diff "$BASE" "$HEAD" --out .intent/index/diff.json --md .intent/index/diff.md

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const diff = fs.readFileSync('.intent/index/diff.md', 'utf8');
            const graph = JSON.parse(fs.readFileSync('.intent/index/graph.json', 'utf8'));
            const nodes = graph.nodes.length;
            const edges = graph.edges.length;
            const specs = graph.nodes.filter(n => n.type === 'spec').length;
            const adrs = graph.nodes.filter(n => n.type === 'adr').length;
            const gates = graph.nodes.filter(n => n.type === 'gate').length;

            const body = `## Sigil Intent Report

            | Metric | Value |
            |--------|-------|
            | Nodes | ${nodes} |
            | Edges | ${edges} |
            | Specs | ${specs} |
            | ADRs | ${adrs} |
            | Gates | ${gates} |

            ${diff}

            > Generated by [Sigil](tools/intent_viewer/index.html) — intent-first engineering`;

            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sigil-artifacts
          path: |
            .intent/index/graph.json
            .intent/index/diff.json
            .intent/badge.svg
            .intent/export.html
            .intent/index/drift.json
            .intent/index/timeline.json
